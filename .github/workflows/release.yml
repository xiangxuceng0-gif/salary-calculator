name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite web app
        run: npx vite build --base=./

      - name: Compile Electron TypeScript
        shell: bash
        run: |
          cat > tsconfig.electron.json << 'TSEOF'
          {
            "compilerOptions": {
              "target": "ES2023",
              "module": "commonjs",
              "moduleResolution": "node",
              "esModuleInterop": true,
              "skipLibCheck": true,
              "strict": false,
              "noEmit": false
            },
            "include": ["electron/main.ts", "electron/preload.ts", "electron/updater.ts"]
          }
          TSEOF
          npx tsc -p tsconfig.electron.json

      - name: Un-ignore dist/ for electron-builder
        shell: bash
        run: sed -i '/^dist\//d' .gitignore

      - name: Build Electron (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: npx electron-builder --win --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: npx electron-builder --mac --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: npx electron-builder --linux --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist-electron/*
          body: |
            ## 🪟 Windows
            下载 **JiCai-Setup-x.x.x.exe**，双击安装。
            > 如提示"已保护你的电脑"，点击「更多信息」→「仍要运行」

            ## 🍎 macOS
            下载 **JiCai-x.x.x.dmg**，拖入 Applications。
            > 首次打开如提示"无法验证"，前往 系统设置 → 隐私与安全性 → 仍要打开

            ## 🐧 Linux
            下载 **JiCai-x.x.x.AppImage**，`chmod +x` 后运行。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
