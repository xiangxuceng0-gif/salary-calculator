appId: com.jicai.app
productName: 记财
copyright: Copyright © 2026 jicai

directories:
  output: dist-electron
  buildResources: public

files:
  - dist/**/*
  - electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: JiCai-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: JiCai-${version}.${ext}
  category: public.app-category.finance

linux:
  target:
    - target: AppImage
      arch: [x64]
  artifactName: JiCai-${version}.${ext}
  category: Finance

publish:
  provider: github
  owner: xiangxuceng0-gif
  repo: salary-calculator
