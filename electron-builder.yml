appId: com.salarycalculator.app
productName: 工资计算器
copyright: Copyright © 2024

directories:
  output: dist-electron
  buildResources: public

files:
  - dist/**/*
  - electron/**/*.js
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}.${ext}
  category: public.app-category.finance

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Finance

publish:
  provider: github
  owner: xiangxuceng0-gif
  repo: salary-calculator
